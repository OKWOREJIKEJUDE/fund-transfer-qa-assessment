name: Fund Transfer API — Automated Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-api-tests:
    name: Run Playwright API Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2 — Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3 — Install dependencies
      - name: Install dependencies
        working-directory: automation
        run: npm ci

      # Step 4 — Install Playwright browsers
      - name: Install Playwright browsers
        working-directory: automation
        run: npx playwright install --with-deps

      # Step 5 — Create environment file
      - name: Create .env file
        working-directory: automation
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}" >> .env

      # Step 6 — Run the tests
      - name: Run Playwright tests
        working-directory: automation
        run: npx playwright test

      # Step 7 — Upload test report as artifact
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: reports/
          retention-days: 30

      # Step 8 — Notify on failure
      - name: Notify on test failure
        if: failure()
        run: |
          echo "Tests failed. Please review the uploaded Playwright report artifact."